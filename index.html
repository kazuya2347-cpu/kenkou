<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>健康記録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --pink: #F4A7B9;
    --pink-light: #FDE8EF;
    --pink-dark: #D4617A;
    --green: #5BAD7F;
    --green-light: #E6F5EE;
    --amber: #E8A020;
    --amber-light: #FEF4E0;
    --purple: #9B7FD4;
    --purple-light: #EFE9FF;
    --bg: #FFF9FB;
    --card: #FFFFFF;
    --text: #3A2A35;
    --muted: #A08898;
    --border: #F0DEE6;
    --shadow: 0 4px 20px rgba(212,97,122,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 110px;
  }

  .header {
    background: linear-gradient(135deg, #D4617A 0%, #F4A7B9 100%);
    padding: 18px 20px 14px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(212,97,122,0.25);
  }
  .header h1 { font-size: 21px; font-weight: 900; color: white; letter-spacing: 0.05em; }
  .header .date-label { font-size: 14px; color: rgba(255,255,255,0.9); margin-top: 2px; font-weight: 700; }

  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 74px; z-index: 99;
  }
  .tab {
    flex: 1; padding: 13px 0; text-align: center;
    font-size: 14px; font-weight: 700; color: var(--muted);
    cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: var(--pink-dark); border-bottom-color: var(--pink-dark); }

  .page { display: none; padding: 14px 14px; }
  .page.active { display: block; }

  /* ===== TIME SECTION CARDS ===== */
  .time-section {
    border-radius: 20px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .time-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }
  .time-header-left { display: flex; align-items: center; gap: 10px; }
  .time-icon { font-size: 24px; }
  .time-title { font-size: 18px; font-weight: 900; }
  .time-sub { font-size: 12px; font-weight: 500; opacity: 0.8; margin-top: 1px; }

  .time-am .time-header { background: linear-gradient(135deg, #3A8A5A, #6DBF8E); color: white; }
  .time-pm .time-header { background: linear-gradient(135deg, #C47A10, #F0B040); color: white; }
  .time-vital .time-header { background: linear-gradient(135deg, #6C3483, #9B7FD4); color: white; }
  .time-memo .time-header { background: linear-gradient(135deg, #555, #888); color: white; }

  .saved-badge {
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
    color: white;
    display: none;
  }
  .saved-badge.show { display: block; }

  .time-body {
    background: white;
    padding: 16px;
  }

  /* ===== DRUG BUTTONS ===== */
  .drug-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  .drug-row:last-child { border-bottom: none; }
  .drug-label {
    flex: 1;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .drug-label small { display: block; font-size: 11px; color: var(--muted); font-weight: 500; }
  .btn-pair { display: flex; gap: 8px; }
  .btn-o, .btn-x {
    width: 56px; height: 48px;
    border: none; border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 22px; font-weight: 900;
    cursor: pointer; transition: all 0.15s;
    opacity: 0.35;
  }
  .btn-o { background: var(--green-light); color: var(--green); }
  .btn-x { background: #FFE8E8; color: #E05050; }
  .btn-o.on { background: var(--green); color: white; opacity: 1; box-shadow: 0 3px 12px rgba(91,173,127,0.45); transform: scale(1.06); }
  .btn-x.on { background: #E05050; color: white; opacity: 1; box-shadow: 0 3px 12px rgba(224,80,80,0.4); transform: scale(1.06); }
  .btn-o:not(.on):active, .btn-x:not(.on):active { opacity: 0.6; transform: scale(0.97); }

  /* ===== VITALS ===== */
  .vital-row {
    display: flex; align-items: center;
    gap: 10px; padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  .vital-row:last-child { border-bottom: none; }
  .vital-label { flex: 1; font-size: 16px; font-weight: 700; }
  .vital-label small { display: block; font-size: 11px; color: var(--muted); font-weight: 500; }
  .vital-input {
    width: 100px; padding: 10px 8px;
    border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 20px; font-weight: 700;
    text-align: center; color: var(--text);
    background: var(--bg);
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .vital-input:focus { outline: none; border-color: var(--purple); background: white; }
  .vital-unit { font-size: 14px; color: var(--muted); font-weight: 700; width: 28px; }

  /* ===== MEMO ===== */
  .memo-area textarea {
    width: 100%; padding: 12px;
    border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px; color: var(--text);
    background: var(--bg); resize: none; height: 90px;
    transition: border-color 0.2s;
  }
  .memo-area textarea:focus { outline: none; border-color: #888; background: white; }

  /* ===== SAVE BUTTON ===== */
  .save-btn {
    width: 100%; padding: 15px;
    border: none; border-radius: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px; font-weight: 900;
    color: white; cursor: pointer;
    margin-top: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.04em;
  }
  .save-btn-am { background: linear-gradient(135deg, #3A8A5A, #6DBF8E); box-shadow: 0 4px 16px rgba(91,173,127,0.4); }
  .save-btn-pm { background: linear-gradient(135deg, #C47A10, #F0B040); box-shadow: 0 4px 16px rgba(230,160,32,0.4); }
  .save-btn-vital { background: linear-gradient(135deg, #6C3483, #9B7FD4); box-shadow: 0 4px 16px rgba(155,127,212,0.4); }
  .save-btn-memo { background: linear-gradient(135deg, #555, #888); box-shadow: 0 4px 16px rgba(100,100,100,0.3); }
  .save-btn:active { transform: scale(0.97); }

  .toast {
    text-align: center; padding: 8px;
    font-size: 15px; font-weight: 700;
    color: var(--green); display: none;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  /* ===== CALENDAR ===== */
  .month-nav {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px;
  }
  .month-nav button {
    background: white; border: 2px solid var(--border);
    border-radius: 12px; padding: 8px 16px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 18px; cursor: pointer;
    color: var(--pink-dark); font-weight: 700;
  }
  .month-label { font-size: 18px; font-weight: 900; }

  .cal-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 180px); border-radius: 16px; box-shadow: var(--shadow); }
  .cal-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    background: white;
    min-width: 460px;
  }
  .cal-table th {
    background: linear-gradient(135deg, #D4617A, #F4A7B9);
    color: white; padding: 9px 3px;
    font-size: 11px; font-weight: 700; text-align: center;
    position: sticky; top: 0; z-index: 10;
  }
  .cal-table td {
    padding: 7px 3px; text-align: center;
    border-top: 1px solid var(--border); vertical-align: middle;
    font-size: 12px;
  }
  .cal-table tr.sat td { background: #EEF4FF; }
  .cal-table tr.sun td { background: #FFF0F0; }

  .day-num { font-size: 14px; font-weight: 900; }
  .day-wd { font-size: 10px; color: var(--muted); }
  .sat-c { color: #3366BB; } .sun-c { color: #CC3344; }
  .today-c { color: var(--pink-dark); text-decoration: underline; }

  .mk { font-size: 15px; font-weight: 900; }
  .mk-o { color: var(--green); }
  .mk-x { color: #E05050; }
  .mk-e { color: #DDD; font-size: 10px; }

  .vital-c { font-size: 11px; font-weight: 700; color: var(--purple); line-height: 1.4; }
  .vital-c small { font-size: 9px; color: var(--muted); font-weight: 400; }
  .memo-dot { display:inline-block; width:7px; height:7px; background:var(--amber); border-radius:50%; }

  .legend {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 12px; padding: 12px 14px;
    background: white; border-radius: 12px; box-shadow: var(--shadow);
    font-size: 12px;
  }
  .legend-item { display:flex; align-items:center; gap:4px; color:var(--muted); font-weight:700; }
</style>
</head>
<body>

<div class="header">
  <h1>🌸 健康記録</h1>
  <div class="date-label" id="headerDate"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('input',this)">✏️ 今日の記録</div>
  <div class="tab" onclick="showPage('calendar',this)">📅 １ヶ月の表</div>
</div>

<!-- 入力ページ -->
<div class="page active" id="page-input">

  <!-- 朝 -->
  <div class="time-section time-am">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">🌅</span>
        <div>
          <div class="time-title">朝のお薬</div>
          <div class="time-sub">薬A・薬B・薬C（３種類）</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-am">✅ 保存済み</div>
    </div>
    <div class="time-body">
      <div class="drug-row">
        <div class="drug-label">薬A<small>朝</small></div>
        <div class="btn-pair">
          <button class="btn-o" onclick="pick('am','A','o',this)">○</button>
          <button class="btn-x" onclick="pick('am','A','x',this)">×</button>
        </div>
      </div>
      <div class="drug-row">
        <div class="drug-label">薬B<small>朝</small></div>
        <div class="btn-pair">
          <button class="btn-o" onclick="pick('am','B','o',this)">○</button>
          <button class="btn-x" onclick="pick('am','B','x',this)">×</button>
        </div>
      </div>
      <div class="drug-row">
        <div class="drug-label">薬C<small>朝</small></div>
        <div class="btn-pair">
          <button class="btn-o" onclick="pick('am','C','o',this)">○</button>
          <button class="btn-x" onclick="pick('am','C','x',this)">×</button>
        </div>
      </div>
      <button class="save-btn save-btn-am" onclick="saveSection('am')">🌅　朝の記録を保存する</button>
      <div class="toast" id="toast-am">✅ 保存しました！</div>
    </div>
  </div>

  <!-- 夕方 -->
  <div class="time-section time-pm">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">🌇</span>
        <div>
          <div class="time-title">夕方のお薬</div>
          <div class="time-sub">薬D（２錠）</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-pm">✅ 保存済み</div>
    </div>
    <div class="time-body">
      <div class="drug-row">
        <div class="drug-label">薬D<small>夕方・２錠</small></div>
        <div class="btn-pair">
          <button class="btn-o" onclick="pick('pm','D','o',this)">○</button>
          <button class="btn-x" onclick="pick('pm','D','x',this)">×</button>
        </div>
      </div>
      <button class="save-btn save-btn-pm" onclick="saveSection('pm')">🌇　夕方の記録を保存する</button>
      <div class="toast" id="toast-pm">✅ 保存しました！</div>
    </div>
  </div>

  <!-- 体温・体重・便通 -->
  <div class="time-section time-vital">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">🌡️</span>
        <div>
          <div class="time-title">体温・体重・便通</div>
          <div class="time-sub">いつでも記入できます</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-vital">✅ 保存済み</div>
    </div>
    <div class="time-body">
      <div class="vital-row">
        <div class="vital-label">体温<small>毎朝測ってください</small></div>
        <input class="vital-input" type="number" id="temp" placeholder="36.5" step="0.1" min="34" max="42">
        <span class="vital-unit">℃</span>
      </div>
      <div class="vital-row">
        <div class="vital-label">体重<small>朝、起きたあと</small></div>
        <input class="vital-input" type="number" id="weight" placeholder="47.5" step="0.1" min="30" max="100">
        <span class="vital-unit">kg</span>
      </div>
      <div class="vital-row">
        <div class="vital-label">便通<small>あった日に○</small></div>
        <div class="btn-pair">
          <button class="btn-o" onclick="pick('vital','bowel','o',this)">○</button>
          <button class="btn-x" onclick="pick('vital','bowel','x',this)">×</button>
        </div>
      </div>
      <button class="save-btn save-btn-vital" onclick="saveSection('vital')">💾　保存する</button>
      <div class="toast" id="toast-vital">✅ 保存しました！</div>
    </div>
  </div>

  <!-- メモ -->
  <div class="time-section time-memo">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">📝</span>
        <div>
          <div class="time-title">メモ</div>
          <div class="time-sub">ヘルパー・病院・体調など</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-memo">✅ 保存済み</div>
    </div>
    <div class="time-body memo-area">
      <textarea id="memo" placeholder="気になることを何でも書いてください"></textarea>
      <button class="save-btn save-btn-memo" onclick="saveSection('memo')">📝　メモを保存する</button>
      <div class="toast" id="toast-memo">✅ 保存しました！</div>
    </div>
  </div>

</div>

<!-- カレンダーページ -->
<div class="page" id="page-calendar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="cal-wrap">
    <table class="cal-table" id="calTable"></table>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="mk mk-o">○</span>飲んだ／あり</div>
    <div class="legend-item"><span class="mk mk-x">×</span>飲まなかった</div>
    <div class="legend-item"><span class="memo-dot"></span>メモあり</div>
    <div class="legend-item" style="background:#EEF4FF;padding:2px 7px;border-radius:6px;">土</div>
    <div class="legend-item" style="background:#FFF0F0;padding:2px 7px;border-radius:6px;">日</div>
  </div>
</div>

<script>
const WD = ['日','月','火','水','木','金','土'];
const today = new Date();
let calYear = today.getFullYear();
let calMonth = today.getMonth();

// in-memory state for today
const state = { am:{}, pm:{}, vital:{}, memo:'' };

function storageKey(y, m, d) {
  return `h_${y}_${String(m+1).padStart(2,'0')}_${String(d).padStart(2,'0')}`;
}
function loadRec(y, m, d) {
  try { const r = localStorage.getItem(storageKey(y,m,d)); return r ? JSON.parse(r) : {}; } catch(e) { return {}; }
}
function saveRec(y, m, d, data) {
  try { localStorage.setItem(storageKey(y,m,d), JSON.stringify(data)); } catch(e) {}
}

// Header date
function updateHeader() {
  const wd = WD[today.getDay()];
  document.getElementById('headerDate').textContent =
    `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${wd}）`;
}

// Tab
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

// Pick button
function pick(section, key, val, btn) {
  state[section][key] = val;
  const pair = btn.parentElement;
  pair.querySelectorAll('button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

// Save section
function saveSection(section) {
  const rec = loadRec(today.getFullYear(), today.getMonth(), today.getDate());
  if (section === 'am') {
    rec.am = { ...state.am };
  } else if (section === 'pm') {
    rec.pm = { ...state.pm };
  } else if (section === 'vital') {
    rec.vital = {
      bowel: state.vital.bowel,
      temp: document.getElementById('temp').value,
      weight: document.getElementById('weight').value,
    };
  } else if (section === 'memo') {
    rec.memo = document.getElementById('memo').value;
  }
  saveRec(today.getFullYear(), today.getMonth(), today.getDate(), rec);

  // badge
  const badge = document.getElementById('badge-' + section);
  badge.classList.add('show');

  // toast
  const toast = document.getElementById('toast-' + section);
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2200);
}

// Load today's existing data
function loadToday() {
  const rec = loadRec(today.getFullYear(), today.getMonth(), today.getDate());

  function restoreBtn(section, key, val, selector) {
    if (!val) return;
    state[section][key] = val;
    document.querySelectorAll(`button[onclick*="pick('${section}','${key}'"]`).forEach(b => {
      const isO = b.classList.contains('btn-o');
      if ((val === 'o' && isO) || (val === 'x' && !isO)) b.classList.add('on');
    });
  }

  if (rec.am) {
    ['A','B','C'].forEach(k => restoreBtn('am', k, rec.am[k]));
    if (rec.am.A || rec.am.B || rec.am.C) document.getElementById('badge-am').classList.add('show');
  }
  if (rec.pm) {
    restoreBtn('pm', 'D', rec.pm.D);
    if (rec.pm.D) document.getElementById('badge-pm').classList.add('show');
  }
  if (rec.vital) {
    restoreBtn('vital', 'bowel', rec.vital.bowel);
    if (rec.vital.temp) document.getElementById('temp').value = rec.vital.temp;
    if (rec.vital.weight) document.getElementById('weight').value = rec.vital.weight;
    if (rec.vital.bowel || rec.vital.temp || rec.vital.weight)
      document.getElementById('badge-vital').classList.add('show');
  }
  if (rec.memo) {
    document.getElementById('memo').value = rec.memo;
    document.getElementById('badge-memo').classList.add('show');
  }
}

// Calendar
function changeMonth(d) {
  calMonth += d;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function mk(v) {
  if (v === 'o') return `<span class="mk mk-o">○</span>`;
  if (v === 'x') return `<span class="mk mk-x">×</span>`;
  return `<span class="mk mk-e">—</span>`;
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${calYear}年${calMonth+1}月`;
  const days = new Date(calYear, calMonth+1, 0).getDate();
  let html = `<thead><tr>
    <th>日</th><th>曜</th>
    <th>薬A<br>朝</th><th>薬B<br>朝</th><th>薬C<br>朝</th>
    <th>薬D<br>夕</th>
    <th>便通</th><th>体温<br>体重</th><th>📝</th>
  </tr></thead><tbody>`;

  for (let d = 1; d <= days; d++) {
    const wd = new Date(calYear, calMonth, d).getDay();
    const rowCls = wd === 6 ? 'sat' : (wd === 0 ? 'sun' : '');
    const wdCls = wd === 6 ? 'sat-c' : (wd === 0 ? 'sun-c' : '');
    const isToday = calYear === today.getFullYear() && calMonth === today.getMonth() && d === today.getDate();
    const numCls = isToday ? 'today-c' : '';

    const rec = loadRec(calYear, calMonth, d);
    const am = rec.am || {};
    const pm = rec.pm || {};
    const vt = rec.vital || {};

    const tempStr = vt.temp
      ? `<span class="vital-c">${vt.temp}<small>℃</small></span>`
      : `<span class="mk mk-e">—</span>`;
    const wgStr = vt.weight ? `<span class="vital-c">${vt.weight}<small>kg</small></span>` : '';
    const vitalCell = tempStr + (wgStr ? '<br>' + wgStr : '');
    const memoCell = rec.memo ? `<span class="memo-dot"></span>` : '';

    html += `<tr class="${rowCls}">
      <td><span class="day-num ${numCls}">${d}</span></td>
      <td><span class="day-wd ${wdCls}">${WD[wd]}</span></td>
      <td>${mk(am.A)}</td><td>${mk(am.B)}</td><td>${mk(am.C)}</td>
      <td>${mk(pm.D)}</td>
      <td>${mk(vt.bowel)}</td>
      <td>${vitalCell}</td>
      <td>${memoCell}</td>
    </tr>`;
  }
  html += '</tbody>';
  document.getElementById('calTable').innerHTML = html;
}

updateHeader();
loadToday();
</script>
