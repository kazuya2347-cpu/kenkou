<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>健康記録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --pink: #F4A7B9; --pink-light: #FDE8EF; --pink-dark: #D4617A;
    --green: #5BAD7F; --green-light: #E6F5EE;
    --amber: #E8A020; --purple: #9B7FD4;
    --bg: #FFF9FB; --text: #3A2A35; --muted: #A08898; --border: #F0DEE6;
    --shadow: 0 4px 20px rgba(212,97,122,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 110px; }

  .header { background: linear-gradient(135deg, #D4617A 0%, #F4A7B9 100%); padding: 18px 20px 14px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(212,97,122,0.25); }
  .header h1 { font-size: 21px; font-weight: 900; color: white; letter-spacing: 0.05em; }
  .header .date-label { font-size: 14px; color: rgba(255,255,255,0.9); margin-top: 2px; font-weight: 700; }

  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); position: sticky; top: 74px; z-index: 99; }
  .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--pink-dark); border-bottom-color: var(--pink-dark); }

  .page { display: none; padding: 14px; }
  .page.active { display: block; }

  /* CARDS */
  .time-section { border-radius: 20px; margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); }
  .time-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
  .time-header-left { display: flex; align-items: center; gap: 10px; }
  .time-icon { font-size: 24px; }
  .time-title { font-size: 18px; font-weight: 900; }
  .time-sub { font-size: 12px; font-weight: 500; opacity: 0.8; margin-top: 1px; }
  .time-am .time-header { background: linear-gradient(135deg, #3A8A5A, #6DBF8E); color: white; }
  .time-pm .time-header { background: linear-gradient(135deg, #C47A10, #F0B040); color: white; }
  .time-vital .time-header { background: linear-gradient(135deg, #6C3483, #9B7FD4); color: white; }
  .time-memo .time-header { background: linear-gradient(135deg, #555, #888); color: white; }
  .time-settings .time-header { background: linear-gradient(135deg, #2C6E8A, #4AADCE); color: white; }

  .saved-badge { background: rgba(255,255,255,0.3); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: white; display: none; }
  .saved-badge.show { display: block; }
  .time-body { background: white; padding: 16px; }

  /* DRUG ROWS */
  .drug-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .drug-row:last-child { border-bottom: none; }
  .drug-label { flex: 1; font-size: 16px; font-weight: 700; color: var(--text); }
  .drug-label small { display: block; font-size: 11px; color: var(--muted); font-weight: 500; }
  .btn-pair { display: flex; gap: 8px; }
  .btn-o, .btn-x { width: 56px; height: 48px; border: none; border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 22px; font-weight: 900; cursor: pointer; transition: all 0.15s; opacity: 0.35; }
  .btn-o { background: var(--green-light); color: var(--green); }
  .btn-x { background: #FFE8E8; color: #E05050; }
  .btn-o.on { background: var(--green); color: white; opacity: 1; box-shadow: 0 3px 12px rgba(91,173,127,0.45); transform: scale(1.06); }
  .btn-x.on { background: #E05050; color: white; opacity: 1; box-shadow: 0 3px 12px rgba(224,80,80,0.4); transform: scale(1.06); }

  /* VITALS */
  .vital-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .vital-row:last-child { border-bottom: none; }
  .vital-label { flex: 1; font-size: 16px; font-weight: 700; }
  .vital-label small { display: block; font-size: 11px; color: var(--muted); font-weight: 500; }
  .vital-input { width: 100px; padding: 10px 8px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; font-weight: 700; text-align: center; color: var(--text); background: var(--bg); -webkit-appearance: none; transition: border-color 0.2s; }
  .vital-input:focus { outline: none; border-color: var(--purple); background: white; }
  .vital-unit { font-size: 14px; color: var(--muted); font-weight: 700; width: 28px; }

  /* MEMO */
  .memo-area textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; color: var(--text); background: var(--bg); resize: none; height: 90px; transition: border-color 0.2s; }
  .memo-area textarea:focus { outline: none; border-color: #888; background: white; }

  /* SAVE BTN */
  .save-btn { width: 100%; padding: 15px; border: none; border-radius: 14px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; font-weight: 900; color: white; cursor: pointer; margin-top: 12px; transition: transform 0.15s; letter-spacing: 0.04em; }
  .save-btn-am { background: linear-gradient(135deg, #3A8A5A, #6DBF8E); box-shadow: 0 4px 16px rgba(91,173,127,0.4); }
  .save-btn-pm { background: linear-gradient(135deg, #C47A10, #F0B040); box-shadow: 0 4px 16px rgba(230,160,32,0.4); }
  .save-btn-vital { background: linear-gradient(135deg, #6C3483, #9B7FD4); box-shadow: 0 4px 16px rgba(155,127,212,0.4); }
  .save-btn-memo { background: linear-gradient(135deg, #555, #888); box-shadow: 0 4px 16px rgba(100,100,100,0.3); }
  .save-btn-settings { background: linear-gradient(135deg, #2C6E8A, #4AADCE); box-shadow: 0 4px 16px rgba(74,173,206,0.4); }
  .save-btn:active { transform: scale(0.97); }

  .toast { text-align: center; padding: 8px; font-size: 15px; font-weight: 700; color: var(--green); display: none; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  /* SETTINGS */
  .drug-setting-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .drug-setting-row:last-child { border-bottom: none; }
  .drug-name-input { flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); background: var(--bg); }
  .drug-name-input:focus { outline: none; border-color: #4AADCE; background: white; }
  .time-select { padding: 10px 8px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); background: var(--bg); }
  .time-select:focus { outline: none; border-color: #4AADCE; }
  .del-btn { width: 40px; height: 40px; border: none; border-radius: 10px; background: #FFE8E8; color: #E05050; font-size: 18px; cursor: pointer; font-weight: 900; flex-shrink: 0; }
  .del-btn:active { opacity: 0.7; }
  .add-drug-btn { width: 100%; padding: 13px; border: 2px dashed #4AADCE; border-radius: 14px; background: #EEF8FC; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; color: #2C6E8A; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
  .add-drug-btn:active { background: #D0EDF7; }

  /* CALENDAR */
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .month-nav button { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 8px 16px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 18px; cursor: pointer; color: var(--pink-dark); font-weight: 700; }
  .month-label { font-size: 18px; font-weight: 900; }
  .cal-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 180px); border-radius: 16px; box-shadow: var(--shadow); }
  .cal-table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; min-width: 400px; }
  .cal-table th { background: linear-gradient(135deg, #D4617A, #F4A7B9); color: white; padding: 9px 3px; font-size: 11px; font-weight: 700; text-align: center; position: sticky; top: 0; z-index: 10; }
  .cal-table td { padding: 7px 3px; text-align: center; border-top: 1px solid var(--border); vertical-align: middle; font-size: 12px; }
  .cal-table tr.sat td { background: #EEF4FF; }
  .cal-table tr.sun td { background: #FFF0F0; }
  .day-num { font-size: 14px; font-weight: 900; }
  .day-wd { font-size: 10px; color: var(--muted); }
  .sat-c { color: #3366BB; } .sun-c { color: #CC3344; }
  .today-c { color: var(--pink-dark); text-decoration: underline; }
  .mk { font-size: 15px; font-weight: 900; }
  .mk-o { color: var(--green); } .mk-x { color: #E05050; } .mk-e { color: #DDD; font-size: 10px; }
  .vital-c { font-size: 11px; font-weight: 700; color: var(--purple); line-height: 1.4; }
  .vital-c small { font-size: 9px; color: var(--muted); font-weight: 400; }
  .memo-text { font-size: 11px; color: var(--text); text-align: left; display: block; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; padding: 12px 14px; background: white; border-radius: 12px; box-shadow: var(--shadow); font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 4px; color: var(--muted); font-weight: 700; }

  .graph-section { background: white; border-radius: 16px; padding: 16px; margin-top: 14px; box-shadow: var(--shadow); }
  .graph-title { font-size: 16px; font-weight: 900; color: var(--text); margin-bottom: 12px; }

  .time-diary .time-header { background: linear-gradient(135deg, #7B4EA0, #B07FD4); color: white; }
  .save-btn-diary { background: linear-gradient(135deg, #7B4EA0, #B07FD4); box-shadow: 0 4px 16px rgba(123,78,160,0.4); }

  .diary-card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .diary-date { font-size: 13px; font-weight: 900; color: var(--pink-dark); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .diary-date .wd-badge { background: var(--pink-light); color: var(--pink-dark); border-radius: 8px; padding: 2px 8px; font-size: 12px; }
  .diary-date .wd-badge.sat { background: #EEF4FF; color: #3366BB; }
  .diary-date .wd-badge.sun { background: #FFF0F0; color: #CC3344; }
  .diary-body { font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-all; }
  .diary-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; line-height: 2; }
</style>
</head>
<body>

<div class="header">
  <h1>🌸 健康記録</h1>
  <div class="date-label" id="headerDate"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('input',this)">✏️ 今日の記録</div>
  <div class="tab" onclick="showPage('calendar',this)">📅 １ヶ月の表</div>
  <div class="tab" onclick="showPage('diary',this)">📖 日記</div>
  <div class="tab" onclick="showPage('settings',this)">⚙️ 薬の設定</div>
</div>

<!-- 入力ページ -->
<div class="page active" id="page-input">
  <!-- 朝 -->
  <div class="time-section time-am">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">🌅</span>
        <div>
          <div class="time-title">朝のお薬</div>
          <div class="time-sub" id="sub-am"></div>
        </div>
      </div>
      <div class="saved-badge" id="badge-am">✅ 保存済み</div>
    </div>
    <div class="time-body" id="body-am"></div>
  </div>

  <!-- 夕方 -->
  <div class="time-section time-pm">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">🌇</span>
        <div>
          <div class="time-title">夕方のお薬</div>
          <div class="time-sub" id="sub-pm"></div>
        </div>
      </div>
      <div class="saved-badge" id="badge-pm">✅ 保存済み</div>
    </div>
    <div class="time-body" id="body-pm"></div>
  </div>

  <!-- 体温・体重・便通 -->
  <div class="time-section time-vital">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">🌡️</span>
        <div>
          <div class="time-title">体温・体重・便通</div>
          <div class="time-sub">いつでも記入できます</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-vital">✅ 保存済み</div>
    </div>
    <div class="time-body">
      <div class="vital-row">
        <div class="vital-label">体温<small>毎朝測ってください</small></div>
        <input class="vital-input" type="number" id="temp" placeholder="36.5" step="0.1" min="34" max="42">
        <span class="vital-unit">℃</span>
      </div>
      <div class="vital-row">
        <div class="vital-label">体重<small>朝、起きたあと</small></div>
        <input class="vital-input" type="number" id="weight" placeholder="47.5" step="0.1" min="30" max="100">
        <span class="vital-unit">kg</span>
      </div>
      <div class="vital-row">
        <div class="vital-label">便通<small>あった日に○</small></div>
        <div class="btn-pair">
          <button class="btn-o" onclick="pick('vital','bowel','o',this)">○</button>
          <button class="btn-x" onclick="pick('vital','bowel','x',this)">×</button>
        </div>
      </div>
      <button class="save-btn save-btn-vital" onclick="saveSection('vital')">💾　保存する</button>
      <div class="toast" id="toast-vital">✅ 保存しました！</div>
    </div>
  </div>

  <!-- メモ -->
  <div class="time-section time-memo">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">📝</span>
        <div>
          <div class="time-title">メモ</div>
          <div class="time-sub">ヘルパー・病院・体調など</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-memo">✅ 保存済み</div>
    </div>
    <div class="time-body memo-area">
      <textarea id="memo" placeholder="気になることを何でも書いてください"></textarea>
      <button class="save-btn save-btn-memo" onclick="saveSection('memo')">📝　メモを保存する</button>
      <div class="toast" id="toast-memo">✅ 保存しました！</div>
    </div>
  </div>

  <!-- 日記 -->
  <div class="time-section time-diary">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">📖</span>
        <div>
          <div class="time-title">今日の日記</div>
          <div class="time-sub">自由に書いてください</div>
        </div>
      </div>
      <div class="saved-badge" id="badge-diary">✅ 保存済み</div>
    </div>
    <div class="time-body memo-area">
      <textarea id="diary" placeholder="今日はどんな一日でしたか？&#10;気持ちや出来事を自由に書いてください🌸" style="height:160px;font-size:16px;line-height:1.8;"></textarea>
      <button class="save-btn save-btn-diary" onclick="saveSection('diary')">📖　日記を保存する</button>
      <div class="toast" id="toast-diary">✅ 保存しました！</div>
    </div>
  </div>
</div>

<!-- カレンダーページ -->
<div class="page" id="page-calendar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="cal-wrap">
    <table class="cal-table" id="calTable"></table>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="mk mk-o">○</span>飲んだ／あり</div>
    <div class="legend-item"><span class="mk mk-x">×</span>飲まなかった</div>
    <div class="legend-item" style="background:#EEF4FF;padding:2px 7px;border-radius:6px;">土</div>
    <div class="legend-item" style="background:#FFF0F0;padding:2px 7px;border-radius:6px;">日</div>
  </div>

  <!-- グラフ -->
  <div class="graph-section">
    <div class="graph-title">🌡️ 体温の変化</div>
    <canvas id="tempChart"></canvas>
  </div>
  <div class="graph-section">
    <div class="graph-title">⚖️ 体重の変化</div>
    <canvas id="weightChart"></canvas>
  </div>
</div>

<!-- 日記ページ -->
<div class="page" id="page-diary">
  <div class="month-nav">
    <button onclick="changeDiaryMonth(-1)">◀</button>
    <div class="month-label" id="diaryMonthLabel"></div>
    <button onclick="changeDiaryMonth(1)">▶</button>
  </div>
  <div id="diary-list"></div>
</div>

<!-- 設定ページ -->
<div class="page" id="page-settings">
  <div class="time-section time-settings">
    <div class="time-header">
      <div class="time-header-left">
        <span class="time-icon">💊</span>
        <div>
          <div class="time-title">お薬の設定</div>
          <div class="time-sub">追加・削除・名前の変更</div>
        </div>
      </div>
    </div>
    <div class="time-body">
      <div id="drug-settings-list"></div>
      <button class="add-drug-btn" onclick="addDrug()">＋ お薬を追加する</button>
      <button class="save-btn save-btn-settings" onclick="saveDrugSettings()" style="margin-top:14px;">💾　設定を保存する</button>
      <div class="toast" id="toast-settings">✅ 保存しました！</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const WD = ['日','月','火','水','木','金','土'];
const today = new Date();
let calYear = today.getFullYear();
let calMonth = today.getMonth();
const state = { vital: {}, memo: '' };

// ===== DRUG SETTINGS =====
const DEFAULT_DRUGS = [
  { id: 'A', name: '薬A', time: 'am' },
  { id: 'B', name: '薬B', time: 'am' },
  { id: 'C', name: '薬C', time: 'am' },
  { id: 'D', name: '薬D', time: 'pm' },
];

function loadDrugs() {
  try {
    const d = localStorage.getItem('drug_settings');
    return d ? JSON.parse(d) : DEFAULT_DRUGS;
  } catch(e) { return DEFAULT_DRUGS; }
}

function saveDrugsToStorage(drugs) {
  try { localStorage.setItem('drug_settings', JSON.stringify(drugs)); } catch(e) {}
}

let drugs = loadDrugs();

// ===== STORAGE =====
function storageKey(y, m, d) { return `h_${y}_${String(m+1).padStart(2,'0')}_${String(d).padStart(2,'0')}`; }
function loadRec(y, m, d) { try { const r = localStorage.getItem(storageKey(y,m,d)); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } }
function saveRec(y, m, d, data) { try { localStorage.setItem(storageKey(y,m,d), JSON.stringify(data)); } catch(e) {} }

// ===== HEADER =====
function updateHeader() {
  const wd = WD[today.getDay()];
  document.getElementById('headerDate').textContent = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${wd}）`;
}

// ===== TABS =====
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'calendar') { renderCalendar(); setTimeout(renderCharts, 50); }
  if (name === 'diary') renderDiaryPage();
  if (name === 'settings') renderDrugSettings();
}

// ===== RENDER INPUT PAGE =====
function renderInputPage() {
  const amDrugs = drugs.filter(d => d.time === 'am');
  const pmDrugs = drugs.filter(d => d.time === 'pm');
  const rec = loadRec(today.getFullYear(), today.getMonth(), today.getDate());
  const amRec = rec.drugs || {};

  // サブタイトル
  document.getElementById('sub-am').textContent = amDrugs.map(d => d.name).join('・') + `（${amDrugs.length}種類）`;
  document.getElementById('sub-pm').textContent = pmDrugs.map(d => d.name).join('・') + `（${pmDrugs.length}種類）`;

  function makeRows(drugList, section) {
    if (drugList.length === 0) {
      return `<p style="color:var(--muted);font-size:14px;padding:10px 0;">薬が登録されていません。「薬の設定」タブから追加してください。</p>`;
    }
    return drugList.map(d => `
      <div class="drug-row">
        <div class="drug-label">${d.name}<small>${d.time === 'am' ? '朝' : '夕方'}</small></div>
        <div class="btn-pair">
          <button class="btn-o ${amRec[d.id] === 'o' ? 'on' : ''}" onclick="pick('${section}','${d.id}','o',this)">○</button>
          <button class="btn-x ${amRec[d.id] === 'x' ? 'on' : ''}" onclick="pick('${section}','${d.id}','x',this)">×</button>
        </div>
      </div>
    `).join('');
  }

  const amHtml = makeRows(amDrugs, 'drugs') + `
    <button class="save-btn save-btn-am" onclick="saveSection('am')">🌅　朝の記録を保存する</button>
    <div class="toast" id="toast-am">✅ 保存しました！</div>`;

  const pmHtml = makeRows(pmDrugs, 'drugs') + `
    <button class="save-btn save-btn-pm" onclick="saveSection('pm')">🌇　夕方の記録を保存する</button>
    <div class="toast" id="toast-pm">✅ 保存しました！</div>`;

  document.getElementById('body-am').innerHTML = amHtml;
  document.getElementById('body-pm').innerHTML = pmHtml;

  // バッジ復元
  if (rec.drugs) {
    const amSaved = amDrugs.some(d => rec.drugs[d.id]);
    const pmSaved = pmDrugs.some(d => rec.drugs[d.id]);
    if (amSaved) document.getElementById('badge-am').classList.add('show');
    if (pmSaved) document.getElementById('badge-pm').classList.add('show');
  }
}

// ===== PICK =====
function pick(section, key, val, btn) {
  if (!state[section]) state[section] = {};
  state[section][key] = val;
  const pair = btn.parentElement;
  pair.querySelectorAll('button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

// ===== SAVE =====
function saveSection(section) {
  const rec = loadRec(today.getFullYear(), today.getMonth(), today.getDate());

  if (section === 'am' || section === 'pm') {
    if (!rec.drugs) rec.drugs = {};
    const sectionDrugs = drugs.filter(d => d.time === section);
    sectionDrugs.forEach(d => {
      if (state.drugs && state.drugs[d.id]) rec.drugs[d.id] = state.drugs[d.id];
    });
  } else if (section === 'vital') {
    rec.vital = { bowel: state.vital.bowel, temp: document.getElementById('temp').value, weight: document.getElementById('weight').value };
  } else if (section === 'memo') {
    rec.memo = document.getElementById('memo').value;
  } else if (section === 'diary') {
    rec.diary = document.getElementById('diary').value;
  }

  saveRec(today.getFullYear(), today.getMonth(), today.getDate(), rec);
  document.getElementById('badge-' + section).classList.add('show');
  const toast = document.getElementById('toast-' + section);
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2200);
}

// ===== LOAD TODAY =====
function loadToday() {
  const rec = loadRec(today.getFullYear(), today.getMonth(), today.getDate());

  // vital
  if (rec.vital) {
    if (rec.vital.bowel) {
      state.vital.bowel = rec.vital.bowel;
      document.querySelectorAll(`button[onclick*="pick('vital','bowel'"]`).forEach(b => {
        const isO = b.classList.contains('btn-o');
        if ((rec.vital.bowel === 'o' && isO) || (rec.vital.bowel === 'x' && !isO)) b.classList.add('on');
      });
    }
    if (rec.vital.temp) document.getElementById('temp').value = rec.vital.temp;
    if (rec.vital.weight) document.getElementById('weight').value = rec.vital.weight;
    if (rec.vital.bowel || rec.vital.temp || rec.vital.weight) document.getElementById('badge-vital').classList.add('show');
  } else {
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const prev = loadRec(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate());
    if (prev.vital) {
      if (prev.vital.temp) document.getElementById('temp').value = prev.vital.temp;
      if (prev.vital.weight) document.getElementById('weight').value = prev.vital.weight;
    }
  }

  if (rec.memo) {
    document.getElementById('memo').value = rec.memo;
    document.getElementById('badge-memo').classList.add('show');
  }
  if (rec.diary) {
    document.getElementById('diary').value = rec.diary;
    document.getElementById('badge-diary').classList.add('show');
  }
}

// ===== DRUG SETTINGS PAGE =====
function renderDrugSettings() {
  const list = document.getElementById('drug-settings-list');
  list.innerHTML = drugs.map((d, i) => `
    <div class="drug-setting-row">
      <input class="drug-name-input" type="text" value="${d.name}" placeholder="薬の名前" id="dname-${i}">
      <select class="time-select" id="dtime-${i}">
        <option value="am" ${d.time === 'am' ? 'selected' : ''}>朝</option>
        <option value="pm" ${d.time === 'pm' ? 'selected' : ''}>夕方</option>
      </select>
      <button class="del-btn" onclick="deleteDrug(${i})">✕</button>
    </div>
  `).join('');
}

function addDrug() {
  const newId = 'drug_' + Date.now();
  drugs.push({ id: newId, name: '新しい薬', time: 'am' });
  renderDrugSettings();
}

function deleteDrug(i) {
  if (drugs.length <= 1) { alert('薬は最低1つ必要です'); return; }
  drugs.splice(i, 1);
  renderDrugSettings();
}

function saveDrugSettings() {
  drugs = drugs.map((d, i) => ({
    id: d.id,
    name: document.getElementById(`dname-${i}`).value || d.name,
    time: document.getElementById(`dtime-${i}`).value,
  }));
  saveDrugsToStorage(drugs);
  renderInputPage();
  const toast = document.getElementById('toast-settings');
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2200);
}

// ===== CALENDAR =====
function changeMonth(d) {
  calMonth += d;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function mk(v) {
  if (v === 'o') return `<span class="mk mk-o">○</span>`;
  if (v === 'x') return `<span class="mk mk-x">×</span>`;
  return `<span class="mk mk-e">—</span>`;
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${calYear}年${calMonth+1}月`;
  const days = new Date(calYear, calMonth+1, 0).getDate();

  const amDrugs = drugs.filter(d => d.time === 'am');
  const pmDrugs = drugs.filter(d => d.time === 'pm');

  let headers = '<th>日</th><th>曜</th>';
  amDrugs.forEach(d => { headers += `<th>${d.name}<br>朝</th>`; });
  pmDrugs.forEach(d => { headers += `<th>${d.name}<br>夕</th>`; });
  headers += '<th>便通</th><th>体温<br>体重</th><th>メモ</th>';

  let html = `<thead><tr>${headers}</tr></thead><tbody>`;

  for (let d = 1; d <= days; d++) {
    const wd = new Date(calYear, calMonth, d).getDay();
    const rowCls = wd === 6 ? 'sat' : (wd === 0 ? 'sun' : '');
    const wdCls = wd === 6 ? 'sat-c' : (wd === 0 ? 'sun-c' : '');
    const isToday = calYear === today.getFullYear() && calMonth === today.getMonth() && d === today.getDate();

    const rec = loadRec(calYear, calMonth, d);
    const drugRec = rec.drugs || {};
    const vt = rec.vital || {};

    let drugCells = '';
    amDrugs.forEach(dr => { drugCells += `<td>${mk(drugRec[dr.id])}</td>`; });
    pmDrugs.forEach(dr => { drugCells += `<td>${mk(drugRec[dr.id])}</td>`; });

    const tempStr = vt.temp ? `<span class="vital-c">${vt.temp}<small>℃</small></span>` : `<span class="mk mk-e">—</span>`;
    const wgStr = vt.weight ? `<span class="vital-c">${vt.weight}<small>kg</small></span>` : '';
    const vitalCell = tempStr + (wgStr ? '<br>' + wgStr : '');
    const memoCell = rec.memo ? `<span class="memo-text">${rec.memo}</span>` : '';

    html += `<tr class="${rowCls}">
      <td><span class="day-num ${isToday ? 'today-c' : ''}">${d}</span></td>
      <td><span class="day-wd ${wdCls}">${WD[wd]}</span></td>
      ${drugCells}
      <td>${mk(vt.bowel)}</td>
      <td>${vitalCell}</td>
      <td style="text-align:left;padding-left:6px;">${memoCell}</td>
    </tr>`;
  }
  html += '</tbody>';
  document.getElementById('calTable').innerHTML = html;
}


let tempChartObj = null;
let weightChartObj = null;

function renderCharts() {
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const labels = [];
  const temps = [];
  const weights = [];

  for (let d = 1; d <= days; d++) {
    const rec = loadRec(calYear, calMonth, d);
    labels.push(d + '日');
    temps.push(rec.vital && rec.vital.temp ? parseFloat(rec.vital.temp) : null);
    weights.push(rec.vital && rec.vital.weight ? parseFloat(rec.vital.weight) : null);
  }

  const commonOptions = {
    responsive: true,
    spanGaps: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { font: { size: 10 }, maxTicksLimit: 15 } },
      y: { ticks: { font: { size: 11 } } }
    },
    elements: { line: { tension: 0.3, borderWidth: 2.5 }, point: { radius: 3 } }
  };

  if (tempChartObj) tempChartObj.destroy();
  if (weightChartObj) weightChartObj.destroy();

  const tCtx = document.getElementById('tempChart').getContext('2d');
  tempChartObj = new Chart(tCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: temps,
        borderColor: '#D4617A',
        backgroundColor: 'rgba(212,97,122,0.08)',
        fill: true,
        pointBackgroundColor: '#D4617A',
      }]
    },
    options: { ...commonOptions, scales: { ...commonOptions.scales, y: { min: 35, max: 40, ticks: { font: { size: 11 }, stepSize: 0.5, callback: v => v + '℃' } } } }
  });

  const wCtx = document.getElementById('weightChart').getContext('2d');
  weightChartObj = new Chart(wCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: weights,
        borderColor: '#9B7FD4',
        backgroundColor: 'rgba(155,127,212,0.08)',
        fill: true,
        pointBackgroundColor: '#9B7FD4',
      }]
    },
    options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ticks: { font: { size: 11 }, callback: v => v + 'kg' } } } }
  });
}


let diaryYear = today.getFullYear();
let diaryMonth = today.getMonth();

function changeDiaryMonth(d) {
  diaryMonth += d;
  if (diaryMonth < 0) { diaryMonth = 11; diaryYear--; }
  if (diaryMonth > 11) { diaryMonth = 0; diaryYear++; }
  renderDiaryPage();
}

function renderDiaryPage() {
  document.getElementById('diaryMonthLabel').textContent = `${diaryYear}年${diaryMonth+1}月`;
  const days = new Date(diaryYear, diaryMonth+1, 0).getDate();
  const entries = [];

  for (let d = days; d >= 1; d--) {
    const rec = loadRec(diaryYear, diaryMonth, d);
    if (rec.diary && rec.diary.trim()) {
      entries.push({ day: d, text: rec.diary });
    }
  }

  const list = document.getElementById('diary-list');
  if (entries.length === 0) {
    list.innerHTML = `<div class="diary-empty">📖<br>この月の日記はまだありません<br><br>「今日の記録」から<br>日記を書いてみましょう🌸</div>`;
    return;
  }

  list.innerHTML = entries.map(e => {
    const wd = new Date(diaryYear, diaryMonth, e.day).getDay();
    const wdLabel = WD[wd];
    const wdClass = wd === 6 ? 'sat' : (wd === 0 ? 'sun' : '');
    return `<div class="diary-card">
      <div class="diary-date">
        ${diaryYear}年${diaryMonth+1}月${e.day}日
        <span class="wd-badge ${wdClass}">${wdLabel}曜日</span>
      </div>
      <div class="diary-body">${e.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  }).join('');
}
